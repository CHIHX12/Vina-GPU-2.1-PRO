# Vina-GPU 2.1 — 可攜式 conda 環境
#
# 用法：
#   conda env create -f tools/environment.yml
#   conda activate vina_docking
#
# 包含：
#   - obabel         : SMILES → PDBQT 3D 生成（MMFF94 力場）
#   - rdkit          : 化學資訊學（可選，dimorphite-dl 依賴）
#   - adfrsuite      : Python 3 版 MGLTools（prepare_receptor / prepare_ligand）
#   - dimorphite_dl  : pH 7.4 正確質子化（NH3+/COO- 等）

name: vina_docking
channels:
  - conda-forge
  - ccsb-scripps
  - defaults
dependencies:
  - python=3.10
  - openbabel>=3.1
  - rdkit>=2023.09
  - adfrsuite          # Python 3 MGLTools (prepare_receptor4, prepare_ligand4)
  - pip
  - pip:
    - dimorphite_dl==1.2.5  # pKa-based protonation (NH3+/COO- correct atom typing)
                             # NOTE: v2.x has a bug where aliphatic amines (pKa~10) are
                             # not protonated at pH 7.4; use v1.2.5
