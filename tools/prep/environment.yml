# Vina-GPU 2.1 — 可攜式 conda 環境（2024-2025 最新工具鏈）
#
# 用法：
#   conda env create -f tools/environment.yml
#   conda activate vina_docking
#
# 工具鏈：
#   meeko              : 官方 Python 3 配體/受體準備（Scripps Forli Lab）
#   gemmi              : meeko 依賴（CIF/PDB 解析）
#   rdkit              : 3D 構型生成（ETKDGv3 + MMFF94）
#   dimorphite_dl 1.2.5: pH 7.4 質子化（NH3+/COO- 正確原子類型）
#   openbabel          : 格式轉換備用
#
# 注意：
#   - dimorphite_dl v2.x 對脂肪族胺有已知 bug，必須用 v1.2.5
#   - meeko v0.7+ 需要 gemmi；用 PDBQTWriterLegacy.write_string()

name: vina_docking
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - rdkit>=2023.09          # 3D 生成（ETKDGv3 + MMFF94）
  - gemmi>=0.6              # meeko 依賴（macromolecule parsing）
  - openbabel>=3.1          # 格式轉換備用
  - pip
  - pip:
    - meeko                 # mk_prepare_ligand.py / mk_prepare_receptor.py
    - dimorphite_dl==1.2.5  # pH 質子化（v2.x 有 amine bug，用 1.2.5）
